services:
  db:
    image: postgres:18.4-bookworm
    container_name: gator_db
    restart: always
    environment:
      POSTGRES_USER: gator
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gator
    ports:
      - "5433:5432"
    volumes:
      - gator_data:/var/lib/postgresql

volumes:
  gator_data:
